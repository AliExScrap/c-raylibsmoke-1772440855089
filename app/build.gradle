plugins {
    id 'com.android.application'
}
android {
    namespace 'com.example.raylibsmoke'
    compileSdk 34
    defaultConfig {
        applicationId "com.example.raylibsmoke"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
        ndk { abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64' }
    }
    externalNativeBuild {
        cmake { path 'src/main/cpp/CMakeLists.txt' }
    }
    buildTypes { release { minifyEnabled false } }
}